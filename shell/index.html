<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Iarsma</title>
    <script>
      // Paint the persisted theme before React mounts so the correct
      // tokens (keyed off [data-theme] on <html>) apply on first paint —
      // no flash-of-wrong-theme on reload. Mirrors theme.ts loadStored()
      // / resolveTheme(). Kept inline + tiny so it runs synchronously.
      (function () {
        try {
          var raw = localStorage.getItem('iarsma-theme-preference');
          var pref = raw === null ? 'system' : JSON.parse(raw);
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
          var resolved =
            pref === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : pref;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          // localStorage / matchMedia unavailable — let React resolve it.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
