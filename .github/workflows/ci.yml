# Iarsma CI — runs on every push to main and every PR.
#
# Three jobs run in parallel; main blocks until all pass:
#   - ts:           typecheck + tests across all TypeScript workspaces
#   - rust:         cargo fmt --check + cargo check + cargo test on the
#                   Rust component workspace
#   - shell-build:  smoke-test the shell's Vite build (depends on ts)
#
# Concurrency control cancels in-progress runs when a new commit lands on
# the same ref — useful for tight feedback on PRs.
#
# WASM components: `ts`, `rust`, and `shell-build` all build the WASM
# component crates with cargo-component before their main steps. Both
# `cargo fmt` (which parses module trees including cfg-gated `mod
# bindings;` declarations) and the shell typecheck (which imports the
# transpiled JS bindings) need the generated artifacts to exist. The
# build step iterates every `components/*` crate so adding a new
# component to the workspace doesn't require touching this file.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '9.12.0'
  NODE_VERSION: '20'
  CARGO_COMPONENT_VERSION: '0.21.1'

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # TypeScript: typecheck + tests across all workspaces.
  # Builds + transpiles WASM components first so the shell can resolve
  # its `../wasm/<name>/<name>.js` imports.
  # ──────────────────────────────────────────────────────────────────────
  ts:
    name: TypeScript (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Cache cargo build state
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-${{ env.CARGO_COMPONENT_VERSION }}

      - name: Install cargo-component
        run: |
          if ! command -v cargo-component >/dev/null; then
            cargo install --locked --version ${{ env.CARGO_COMPONENT_VERSION }} cargo-component
          fi
          cargo component --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build + transpile WASM components
        run: bash .github/scripts/build-wasm.sh

      - name: Run codegen (so generated artifacts exist for downstream typecheck)
        run: pnpm codegen

      - name: Typecheck all workspaces
        run: pnpm -r --workspace-concurrency=1 typecheck

      - name: Run tests in all workspaces
        run: pnpm -r --workspace-concurrency=1 run test

  # ──────────────────────────────────────────────────────────────────────
  # Rust: workspace fmt + check + test across the WASM component crates.
  # The component build is a prereq for `cargo fmt --check`, which walks
  # `mod bindings;` declarations even under cfg-gating.
  # ──────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (fmt + check + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Cache cargo build state
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-${{ env.CARGO_COMPONENT_VERSION }}

      - name: Install cargo-component
        run: |
          if ! command -v cargo-component >/dev/null; then
            cargo install --locked --version ${{ env.CARGO_COMPONENT_VERSION }} cargo-component
          fi
          cargo component --version

      # Generates each component's src/bindings.rs so the cfg-gated
      # `mod bindings;` declarations resolve during fmt + check.
      - name: Build WASM components (generates bindings.rs)
        run: |
          set -euo pipefail
          for cargo_toml in components/*/Cargo.toml; do
            comp_name=$(basename "$(dirname "$cargo_toml")")
            echo "→ cargo component build -p $comp_name"
            cargo component build -p "$comp_name" --release
          done

      # Run rustfmt over the Rust files we actually own. `git ls-files`
      # excludes the cargo-component-generated `bindings.rs` automatically
      # because those are gitignored — no fragile `find -not` filter
      # needed. (`cargo fmt`'s `ignore` config is nightly-only on stable
      # rustfmt, which is why we drive `rustfmt` directly.)
      - name: Format check
        run: |
          set -euo pipefail
          git ls-files -z '*.rs' | xargs -0 rustfmt --check --edition 2021

      - name: Workspace check
        run: cargo check --workspace

      - name: Workspace test (host target)
        run: cargo test --workspace

  # ──────────────────────────────────────────────────────────────────────
  # Shell bundle build smoke.
  # Verifies the Vite build succeeds end-to-end including codegen-produced
  # files and transpiled WASM bindings. Depends on ts (no point bundling
  # if typecheck is broken).
  # ──────────────────────────────────────────────────────────────────────
  shell-build:
    name: Shell bundle (Vite build smoke)
    runs-on: ubuntu-latest
    needs: ts
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Cache cargo build state
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-${{ env.CARGO_COMPONENT_VERSION }}

      - name: Install cargo-component
        run: |
          if ! command -v cargo-component >/dev/null; then
            cargo install --locked --version ${{ env.CARGO_COMPONENT_VERSION }} cargo-component
          fi
          cargo component --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build + transpile WASM components
        run: bash .github/scripts/build-wasm.sh

      - name: Run codegen
        run: pnpm codegen

      - name: Build the shell bundle
        env:
          # Build-only smoke — values are placeholders, never reach a real
          # auth server. Production deploys ship a `config.json` instead.
          VITE_OIDC_ISSUER: 'https://example.invalid'
          VITE_OAUTH_CLIENT_ID: 'webmail'
          VITE_OAUTH_REDIRECT_URI: 'http://localhost:5173/auth/callback'
        run: pnpm --filter '@iarsma/shell' run build

      - name: Verify dist/ output
        run: |
          test -d shell/dist || (echo "::error::shell/dist missing"; exit 1)
          test -f shell/dist/index.html || (echo "::error::shell/dist/index.html missing"; exit 1)
          ls -la shell/dist
          du -sh shell/dist
