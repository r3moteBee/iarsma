# Iarsma release pipeline.
#
# Triggered by pushing a `v*` tag (e.g., `v0.1.0`). Builds the same
# bundle `just package` produces locally — codegen → wasm components →
# Vite production build → versioned `iarsma-<version>.zip` — and
# attaches it to a new GitHub Release.
#
# Bundle versioning matches the git tag (D-028). The version stamped
# inside `iarsma/version.json` is derived from the tag, not from
# `package.json`, so the artifact is self-identifying once unzipped.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual trigger — useful for cutting a deploy-prefix-specific build
    # without a new git tag (e.g., `iarsma-0.1.2-webmail.zip` for a
    # `/webmail/` deploy alongside the canonical root-deployed `0.1.2`).
    inputs:
      version:
        description: 'Version string for the artifact (no leading `v`)'
        required: true
        type: string
      base_path:
        description: 'Vite `base` for the build (path the bundle is deployed at — must start AND end with `/`)'
        required: false
        default: '/'
        type: string

permissions:
  # Required to create releases and upload assets.
  contents: write

env:
  PNPM_VERSION: '9.12.0'
  NODE_VERSION: '20'
  CARGO_COMPONENT_VERSION: '0.21.1'

jobs:
  release:
    name: Build + publish iarsma.zip
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Cache cargo build state
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-${{ env.CARGO_COMPONENT_VERSION }}

      - name: Install cargo-component
        run: |
          if ! command -v cargo-component >/dev/null; then
            cargo install --locked --version ${{ env.CARGO_COMPONENT_VERSION }} cargo-component
          fi
          cargo component --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive version + base_path from trigger
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            tag=""   # workflow_dispatch builds don't create a Release
            base_path="${{ inputs.base_path }}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            base_path='/'
          fi
          # Append `-base<slug>` to the artifact filename for non-root
          # builds so multiple base-path variants of the same version
          # don't collide on the Releases page.
          if [[ "$base_path" != '/' ]]; then
            slug="$(echo "$base_path" | tr -c 'a-zA-Z0-9' '-' | sed 's/^-*//;s/-*$//')"
            asset_suffix="-base-${slug}"
          else
            asset_suffix=""
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "base_path=$base_path" >> "$GITHUB_OUTPUT"
          echo "asset_suffix=$asset_suffix" >> "$GITHUB_OUTPUT"

      - name: Build + transpile WASM components
        run: bash .github/scripts/build-wasm.sh

      - name: Run codegen
        run: pnpm codegen

      - name: Build the shell bundle
        env:
          # Vite `base` — controls the prefix asset URLs reference. `/`
          # for root-deployed bundles, `/<prefix>/` for sub-path deploys.
          VITE_BASE_PATH: ${{ steps.ver.outputs.base_path }}
        run: pnpm --filter '@iarsma/shell' run build

      - name: Stage + zip the bundle
        id: pkg
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          suffix="${{ steps.ver.outputs.asset_suffix }}"
          out="iarsma-${version}${suffix}.zip"
          base_path="${{ steps.ver.outputs.base_path }}"
          # Stamp version metadata + the base path into dist/ so the
          # deployed bundle self-identifies via /version.json.
          echo "{\"version\":\"${version}\",\"basePath\":\"${base_path}\",\"builtAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > shell/dist/version.json
          # Zip with files at root — Stalwart Web Apps serves the zip's
          # root at the configured URL prefix, so any wrapper directory
          # would land URLs at `<prefix>/<wrapper>/...` (wrong).
          (cd shell/dist && zip -qr "$GITHUB_WORKSPACE/$out" .)
          ls -la "$out"
          du -h "$out"
          echo "asset=$out" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256 for downstream verification
        id: sum
        run: |
          asset="${{ steps.pkg.outputs.asset }}"
          sha=$(sha256sum "$asset" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "$sha  $asset" > "${asset}.sha256"

      # Tag-driven runs publish to the Release page; workflow_dispatch
      # runs upload as a workflow artifact only (no Release record).
      # Operators producing a base-path-specific build dispatch manually,
      # download from the workflow run, and upload to a Release of their
      # choice.
      - name: Create release + upload asset (tag-driven only)
        if: ${{ steps.ver.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
          body: |
            ## Iarsma ${{ steps.ver.outputs.tag }}

            Reproducible static-bundle build of the Iarsma webmail.

            **Asset:** `${{ steps.pkg.outputs.asset }}`
            **SHA-256:** `${{ steps.sum.outputs.sha256 }}`
            **Base path:** `/` (root-deployed)

            ### Deploy

            See [docs/deployment.md](https://github.com/${{ github.repository }}/blob/${{ steps.ver.outputs.tag }}/docs/deployment.md) for the full guide. Same-origin Stalwart Web Apps deploys at `/` need no `config.json` — the bundle uses same-origin defaults. For a non-root prefix, dispatch the workflow manually with `base_path=/<prefix>/` to get a build whose asset URLs target that prefix.

            Bundle self-identifies via `version.json` after extraction.

      # workflow_dispatch builds upload as workflow artifacts so the
      # operator can attach them to whatever Release they want.
      - name: Upload as workflow artifact (workflow_dispatch only)
        if: ${{ steps.ver.outputs.tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
          retention-days: 30
