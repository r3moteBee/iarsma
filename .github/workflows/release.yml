# Iarsma release pipeline.
#
# Triggered by pushing a `v*` tag (e.g. `v0.1.0`). Builds the bundle for
# every base-path variant in `BASE_PATHS` below, attaches versioned +
# stable filenames to a single GitHub Release, and stamps each variant
# with `version.json` so the deployed artifact self-identifies.
#
# Stable filenames pin once. Operators set Stalwart's Resource URL to
# `https://github.com/<owner>/<repo>/releases/latest/download/<stable>`
# once and never edit it again — GitHub's `latest` redirect sends each
# new release through automatically.
#
# Bundle versioning matches the git tag (D-028).

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual trigger for an off-tag custom build (e.g., a deploy-prefix
    # variant the canonical matrix doesn't already cover). Uploads as a
    # workflow artifact only — no Release record.
    inputs:
      version:
        description: 'Version string for the artifact (no leading `v`)'
        required: true
        type: string
      base_path:
        description: 'Vite `base` for the build (path the bundle is deployed at — must start AND end with `/`)'
        required: false
        default: '/'
        type: string

permissions:
  # Required to create releases and upload assets.
  contents: write

env:
  PNPM_VERSION: '9.12.0'
  NODE_VERSION: '20'
  CARGO_COMPONENT_VERSION: '0.21.1'

jobs:
  release:
    name: Build + publish iarsma.zip
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Cache cargo build state
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-${{ env.CARGO_COMPONENT_VERSION }}

      - name: Install cargo-component
        run: |
          if ! command -v cargo-component >/dev/null; then
            cargo install --locked --version ${{ env.CARGO_COMPONENT_VERSION }} cargo-component
          fi
          cargo component --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive trigger context
        id: trig
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + transpile WASM components
        run: bash .github/scripts/build-wasm.sh

      - name: Run codegen
        run: pnpm codegen

      # ────────────────────────────────────────────────────────────────
      # Tag-driven path: build EVERY canonical base-path variant +
      # publish all artifacts (versioned + stable filenames) to one
      # Release. The matrix is a bash array because GitHub matrix jobs
      # can't easily share a single Release-creation step; doing the
      # builds sequentially in one job keeps the workflow simple.
      # ────────────────────────────────────────────────────────────────
      - name: Build + zip every canonical variant (tag-driven)
        if: ${{ steps.trig.outputs.tag != '' }}
        id: tag_assets
        run: |
          set -euo pipefail
          version="${{ steps.trig.outputs.version }}"
          # Each entry: "<base_path>|<stable_suffix>". Stable suffix is
          # what gets prepended to `iarsma.zip` in the stable filename.
          # Add a row when a new canonical deploy prefix joins the fleet.
          variants=(
            "/|"
            "/webmail/|-base-webmail"
          )
          assets=()
          for entry in "${variants[@]}"; do
            base_path="${entry%%|*}"
            stable_suffix="${entry##*|}"
            slug=""
            if [[ "$base_path" != '/' ]]; then
              slug="$(echo "$base_path" | tr -c 'a-zA-Z0-9' '-' | sed 's/^-*//;s/-*$//')"
              versioned="iarsma-${version}-base-${slug}.zip"
              stable="iarsma-base-${slug}.zip"
            else
              versioned="iarsma-${version}.zip"
              stable="iarsma.zip"
            fi
            echo "::group::Building base=$base_path → $versioned + $stable"
            VITE_BASE_PATH="$base_path" IARSMA_VERSION="$version" pnpm --filter '@iarsma/shell' run build
            echo "{\"version\":\"${version}\",\"basePath\":\"${base_path}\",\"builtAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              > shell/dist/version.json
            (cd shell/dist && zip -qr "$GITHUB_WORKSPACE/$versioned" .)
            cp "$versioned" "$stable"
            sha256sum "$versioned" | tee "${versioned}.sha256"
            sha256sum "$stable"    | tee "${stable}.sha256"
            assets+=("$versioned" "${versioned}.sha256" "$stable" "${stable}.sha256")
            echo "::endgroup::"
          done
          # Emit newline-separated list for the upload step.
          printf '%s\n' "${assets[@]}" > /tmp/release-assets.list
          ls -la iarsma-*.zip iarsma-*.sha256 iarsma.zip 2>/dev/null

      - name: Create Release + upload all variants (tag-driven only)
        if: ${{ steps.trig.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.trig.outputs.tag }}
          name: ${{ steps.trig.outputs.tag }}
          generate_release_notes: true
          files: |
            iarsma-${{ steps.trig.outputs.version }}.zip
            iarsma-${{ steps.trig.outputs.version }}.zip.sha256
            iarsma.zip
            iarsma.zip.sha256
            iarsma-${{ steps.trig.outputs.version }}-base-webmail.zip
            iarsma-${{ steps.trig.outputs.version }}-base-webmail.zip.sha256
            iarsma-base-webmail.zip
            iarsma-base-webmail.zip.sha256
          body: |
            ## Iarsma ${{ steps.trig.outputs.tag }}

            Reproducible static-bundle build of the Iarsma webmail.

            ### Stable URLs (pin once, auto-update on release)

            Operators set Stalwart's Resource URL to a stable URL — GitHub redirects `releases/latest/download/<asset>` to whichever release is marked Latest, so the next tag-driven publish drops in automatically on the next "Update applications" tick.

            | Deploy posture | Stable URL |
            |---|---|
            | Root deploy | `https://github.com/${{ github.repository }}/releases/latest/download/iarsma.zip` |
            | `/webmail/` prefix | `https://github.com/${{ github.repository }}/releases/latest/download/iarsma-base-webmail.zip` |

            ### Versioned (archival)

            - `iarsma-${{ steps.trig.outputs.version }}.zip` (root)
            - `iarsma-${{ steps.trig.outputs.version }}-base-webmail.zip` (`/webmail/` prefix)
            - Both have a `.sha256` companion.

            ### Deploy

            See [docs/deployment.md](https://github.com/${{ github.repository }}/blob/${{ steps.trig.outputs.tag }}/docs/deployment.md). Same-origin Stalwart Web Apps deploys need no `config.json` — the bundle uses same-origin defaults derived from `window.location`. Adding a new canonical deploy prefix to the matrix is a one-line addition to `.github/workflows/release.yml`.

      # ────────────────────────────────────────────────────────────────
      # workflow_dispatch path: single ad-hoc build, uploaded as a
      # workflow artifact (no Release record). For one-off custom
      # prefixes outside the canonical matrix.
      # ────────────────────────────────────────────────────────────────
      - name: Build single variant (workflow_dispatch)
        if: ${{ steps.trig.outputs.tag == '' }}
        id: dispatch_pkg
        env:
          VITE_BASE_PATH: ${{ inputs.base_path }}
          IARSMA_VERSION: ${{ steps.trig.outputs.version }}
        run: |
          set -euo pipefail
          version="${{ steps.trig.outputs.version }}"
          base_path="${{ inputs.base_path }}"
          if [[ "$base_path" != '/' ]]; then
            slug="$(echo "$base_path" | tr -c 'a-zA-Z0-9' '-' | sed 's/^-*//;s/-*$//')"
            out="iarsma-${version}-base-${slug}.zip"
          else
            out="iarsma-${version}.zip"
          fi
          pnpm --filter '@iarsma/shell' run build
          echo "{\"version\":\"${version}\",\"basePath\":\"${base_path}\",\"builtAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > shell/dist/version.json
          (cd shell/dist && zip -qr "$GITHUB_WORKSPACE/$out" .)
          sha256sum "$out" | tee "${out}.sha256"
          echo "asset=$out" >> "$GITHUB_OUTPUT"

      - name: Upload single variant as workflow artifact
        if: ${{ steps.trig.outputs.tag == '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.dispatch_pkg.outputs.asset }}
          path: |
            ${{ steps.dispatch_pkg.outputs.asset }}
            ${{ steps.dispatch_pkg.outputs.asset }}.sha256
          retention-days: 30
